apiVersion: extensions/v1beta1
kind: Deployment
metadata:
  name:  auth
  labels:
    name:  auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app:  auth
  template:
    metadata:
      labels:
        name:  auth
    spec:
      containers:
      - image:  auth:latest
        imagePullPolicy: Always
        name:  auth
        resources:
          requests:
            cpu: "256m"
            memory: "128Mi"
          limits:
            cpu: "512m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /auth/status/healthz
            port: 3000
          initialDelaySeconds: 90
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /auth/status/healthz
            port: 3000
          initialDelaySeconds: 30
          timeoutSeconds: 10
        ports:
        - containerPort:  3000
          name:  auth-d-port
        env: 
        - name:  AUTH_MONGO_URI  
          valueFrom:    
            configMapKeyRef:    
              name:  database    
              key:  AUTH_MONGO_URI
        - name:  JWT  
          valueFrom:    
            secretKeyRef:    
              name:  jwt    
              key:  JWT
        - name:  GOOGLE_CLIENT_ID  
          valueFrom:    
            secretKeyRef:    
              name:  google    
              key:  GOOGLE_CLIENT_ID
        - name:  GOOGLE_CLIENT_SECRET  
          valueFrom:    
            secretKeyRef:    
              name:  google    
              key:  GOOGLE_CLIENT_SECRET

        


