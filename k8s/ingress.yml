kind: Ingress
metadata:
  name: INKz-ingress
  labels:
    app.kubernetes.io/name: INKz-ingress
spec:
  rules:
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: sandbox-service
            port: 
              number: 80
